lint:
  use:
    - DEFAULT
  enum_zero_value_suffix: ""
  service_suffix: ""
  ignore:
    - google/api/annotations.proto
  except: []
  allow_comment_ignores: true
  ignore_only: {}
deps:
  - github.com/googleapis/googleapis
  - github.com/bufbuild/protovalidate
  - github.com/grpc-ecosystem/grpc-gateway
generate:
  inputs:
    - directory: api
  plugins:
    - name: go
      out: pkg
      opts:
        paths: source_relative
    - name: go-grpc
      out: pkg
      opts:
        paths: source_relative
    - name: grpc-gateway
      out: pkg
      opts:
        logtostderr: true
        paths: source_relative
        generate_unbound_methods: true
        allow_delete_body: true
    - name: openapiv2
      out: pkg
      opts:
        allow_merge: true
        merge_file_name: ../swagger/api
        generate_unbound_methods: true
        json_names_for_fields: false
        allow_delete_body: true
    - name: validate
      out: pkg
      opts:
        paths: source_relative
        lang: go
breaking:
  ignore: []
  against_git_ref: ""